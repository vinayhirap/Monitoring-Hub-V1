<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add AWS Account</title>

  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      padding: 16px 24px;
      background: #020617;
      font-size: 18px;
      font-weight: 600;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #020617;
      padding: 24px;
      border-radius: 10px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      opacity: 0.9;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 6px;
      color: #e5e7eb;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #22c55e;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    .primary {
      background: #22c55e;
      color: #020617;
    }

    .secondary {
      background: #334155;
      color: #e5e7eb;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }
  </style>
</head>

<body>

<header>Admin → AWS Accounts</header>

<div class="container">
  <h2>Add AWS Account</h2>

  <label>Account Name</label>
  <input id="accountName" placeholder="AuroGov Prod">

  <label>AWS Account ID</label>
  <input id="accountId" placeholder="123456789012">

  <label>Role ARN</label>
  <input id="roleArn" placeholder="arn:aws:iam::123456789012:role/CrossAccountRole">

  <label>External ID</label>
  <input id="externalId" placeholder="external-id-xyz">

  <label>Default Region</label>
  <input id="region" placeholder="ap-south-1">

  <div class="actions">
    <button class="secondary" onclick="testConnection()">Test Connection</button>
    <button class="primary" onclick="addAccount()">Add Account</button>
  </div>

  <div id="status" class="status"></div>
</div>

<script>
function setStatus(message, type) {
  const el = document.getElementById("status");
  el.textContent = message;
  el.className = "status " + type;
}

function getValue(id) {
  return document.getElementById(id).value.trim();
}

async function testConnection() {
  try {
    setStatus("Testing connection...", "");

    const res = await fetch(
      "http://127.0.0.1:8000/admin/aws-accounts/test-connection",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          role_arn: getValue("roleArn"),
          external_id: getValue("externalId"),
          region: getValue("region")
        })
      }
    );

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }

    setStatus("Connection successful ✅", "success");

  } catch (e) {
    setStatus("Connection failed ❌: " + e.message, "error");
  }
}

async function addAccount() {
  try {
    setStatus("Adding AWS account...", "");

    const res = await fetch(
      "http://127.0.0.1:8000/admin/aws-accounts",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          account_name: getValue("accountName"),
          account_id: getValue("accountId"),
          role_arn: getValue("roleArn"),
          external_id: getValue("externalId"),
          default_region: getValue("region")
        })
      }
    );

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }

    setStatus("AWS account added successfully 🎉", "success");

  } catch (e) {
    setStatus("Failed to add account ❌: " + e.message, "error");
  }
}
</script>

</body>
</html>
