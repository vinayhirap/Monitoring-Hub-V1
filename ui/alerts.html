<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Monitoring Hub – Alerts</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/ui/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/ui/img/logo.png" class="logo" alt="logo">
      <div><h1>Open Alerts</h1></div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <table class="table">
        <thead><tr><th>Instance</th><th>Metric</th><th>Value</th><th>Severity</th><th>Triggered</th><th>Action</th></tr></thead>
        <tbody id="alerts"></tbody>
      </table>
    </section>
  </main>

  <script src="/ui/js/api.js"></script>
  <script src="/ui/js/ws.js"></script>
  <script>
    async function loadAlerts() {
      const data = await getOpenAlerts();
      const tb = document.getElementById('alerts');
      tb.innerHTML = '';
      data.forEach(a => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${a.instance || a.resource_id}</td>
          <td>${a.metric_name}</td>
          <td>${a.current_value ?? '-'}</td>
          <td class="${a.severity.toLowerCase()}">${a.severity}</td>
          <td>${a.triggered_at}</td>
          <td><button onclick="resolve(${a.id})">Resolve</button></td>
        `;
        tb.appendChild(tr);
      });
    }
    async function resolve(id) {
      await fetch(`/alerts/${id}/resolve`, { method: 'POST' });
      loadAlerts(); // refresh
    }
    loadAlerts();
    setInterval(loadAlerts, 15000);
    connectAlertWS((alerts) => loadAlerts());
  </script>
</body>
</html>
