<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Monitoring Hub – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS -->
  <link rel="stylesheet" href="/ui/css/style.css?v=1" />

  <!-- Disable aggressive caching during dev -->
  <meta http-equiv="Cache-Control" content="no-store" />
</head>

<body>

<!-- =========================
  TOP BAR
========================= -->
<header class="topbar">
  <div class="brand">
    <img src="/ui/img/logo.png" alt="Monitoring Hub" class="logo" />
    <div>
      <h1>Monitoring Hub</h1>
      <div class="subtitle">Internal NOC • Real-time</div>
    </div>
  </div>

  <div class="right">
    <div class="meta">
      <div class="meta-label">Last refresh</div>
      <div id="lastRefresh">—</div>
    </div>
    <button id="refreshBtn">Refresh</button>
  </div>
</header>

<!-- =========================
  MAIN CONTENT
========================= -->
<main class="container">

  <!-- ===== SUMMARY CARDS ===== -->
  <section class="summary">
    <div class="card ok">
      <div class="label">OK</div>
      <div class="value" id="okCount">0</div>
    </div>

    <div class="card warning">
      <div class="label">Warning</div>
      <div class="value" id="warningCount">0</div>
    </div>

    <div class="card critical">
      <div class="label">Critical</div>
      <div class="value" id="criticalCount">0</div>
    </div>
  </section>

  <!-- ===== ACCOUNT / SERVICE TILES ===== -->
  <section class="tiles" id="accountTiles">
    <!-- populated dynamically -->
  </section>

  <!-- ===== OPEN ALERTS ===== -->
  <section class="panel">
    <h2>Open Alerts</h2>

    <ul id="alertList" class="alert-list">
      <li class="muted">No active alerts</li>
    </ul>
  </section>

  <!-- ===== EC2 DRILLDOWN ===== -->
  <section id="ec2Section" class="panel hidden">
    <h2>EC2 Instances</h2>

    <table class="table">
      <thead>
        <tr>
          <th>Instance</th>
          <th>Name</th>
          <th>CPU %</th>
          <th>Env</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="ec2Table">
        <!-- rows injected dynamically -->
      </tbody>
    </table>
  </section>

  <footer class="footer">
    Monitoring Hub • Proof of Concept
  </footer>

</main>

<!-- =========================
  SCRIPTS (ORDER MATTERS)
========================= -->

<script>
  /* shared audio instance */
  window.ALERT_SOUND = new Audio(
    "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
  );
</script>

<script src="/ui/js/api.js?v=1"></script>
<script src="/ui/js/ws.js?v=1"></script>
<script src="/ui/js/dashboard.js?v=1"></script>

</body>
</html>
