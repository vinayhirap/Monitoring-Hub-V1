<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>EC2 Instance</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/ui/css/style.css">
</head>
<body>
  <header class="topbar"><div class="brand"><img src="/ui/img/logo.png" class="logo"><h1 id="title">EC2 Instance</h1></div></header>
  <main class="container panel">
    <h3>CPU (last 30 points)</h3>
    <svg id="chart" style="width:100%;height:240px;background:#020617;border-radius:8px"></svg>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    document.getElementById('title').innerText = `EC2 → ${id}`;

    function draw(data){
      const svg = document.getElementById('chart');
      svg.innerHTML='';
      if(!data || data.length===0) return;
      const w = svg.clientWidth, h=svg.clientHeight, max=100;
      const step = w/(data.length-1 || 1);
      let points = data.map((d,i)=>`${i*step},${h - (d.metric_value/max)*h}`).join(' ');
      const p = document.createElementNS('http://www.w3.org/2000/svg','polyline');
      p.setAttribute('points', points);
      p.setAttribute('fill','none');
      p.setAttribute('stroke','#22c55e');
      p.setAttribute('stroke-width','2');
      svg.appendChild(p);
    }

    async function load(){
      const data = await fetch(`/ec2/instances/${id}/metrics`).then(r=>r.json());
      draw(data);
    }
    load(); setInterval(load, 5000);
  </script>
</body>
</html>
