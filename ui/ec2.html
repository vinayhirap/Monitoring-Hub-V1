<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EC2 Instances</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/ui/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/ui/img/logo.png" class="logo" alt="logo">
      <div><h1>EC2 → Instances</h1></div>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <table class="table">
        <thead><tr><th>Instance ID</th><th>Name</th><th>CPU%</th><th>Status</th><th>Last Seen</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>

  <script>
    async function loadInstances(){
      const rows = await fetch("/ec2/instances").then(r=>r.json());
      const tb = document.getElementById('rows'); tb.innerHTML='';
      rows.forEach(i=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i.resource_id}</td><td>${i.name||'-'}</td><td>${i.cpu ?? '-'}</td><td class="${i.status}">${i.status}</td><td>${i.last_seen || '-'}</td>`;
        tr.onclick = ()=> location.href = `ec2-instance.html?id=${i.resource_id}`;
        tb.appendChild(tr);
      })
    }
    loadInstances();
    setInterval(loadInstances, 15000);
  </script>
</body>
</html>
