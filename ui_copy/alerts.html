<!DOCTYPE html>
<html>
<head>
  <title>Alerts</title>
  <style>
    body {
      background: #0f172a;
      color: #e5e7eb;
      font-family: Segoe UI, Arial;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #020617;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #1e293b;
    }
    th {
      text-align: left;
      opacity: 0.8;
    }
    .critical { color: #ef4444; }
    .warning { color: #f59e0b; }
    .ok { color: #22c55e; }
    button {
      background: #22c55e;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<h2>Open Alerts</h2>

<table>
  <thead>
    <tr>
      <th>Instance</th>
      <th>Metric</th>
      <th>Value</th>
      <th>Severity</th>
      <th>Triggered</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="alerts"></tbody>
</table>

<script>
fetch("http://127.0.0.1:8000/alerts/open")
  .then(r => r.json())
  .then(data => {
    const tbody = document.getElementById("alerts");
    data.forEach(a => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${a.instance}</td>
        <td>${a.metric_name}</td>
        <td>${a.current_value}</td>
        <td class="${a.severity}">${a.severity.toUpperCase()}</td>
        <td>${a.triggered_at}</td>
        <td>
          <button onclick="resolve(${a.id})">Resolve</button>
        </td>
      `;
      tbody.appendChild(row);
    });
  });

function resolve(id) {
  fetch(`http://127.0.0.1:8000/alerts/${id}/resolve`, {
    method: "POST"
  }).then(() => location.reload());
}
</script>

<script>
  // 🔊 Alarm sound
  const alarm = new Audio(
    "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
  );

  function beep() {
    alarm.currentTime = 0;
    alarm.play().catch(() => {});
  }

  // Avoid repeat beeps for same alert
  const SEEN = new Set();

  // 🔌 WebSocket to backend
  const ws = new WebSocket("ws://127.0.0.1:8000/ws/alerts");

  ws.onopen = () => {
    console.log("WS CONNECTED");
  };

  ws.onmessage = (e) => {
    const alerts = JSON.parse(e.data);
    console.log("ALERTS:", alerts);

    alerts.forEach(a => {
      const key = `${a.id}-${a.status}`;
      if (SEEN.has(key)) return;

      SEEN.add(key);

      if (a.severity === "CRITICAL") {
        beep();
      }
    });
  };

  ws.onerror = (e) => {
    console.error("WS ERROR", e);
  };
</script>

</body>
</html>
