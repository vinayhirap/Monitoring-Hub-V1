<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Metric Catalog</title>

  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      padding: 16px 24px;
      background: #020617;
      font-size: 18px;
      font-weight: 600;
    }

    .container {
      padding: 24px;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #020617;
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #020617;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }

    th {
      color: #94a3b8;
      font-weight: 500;
    }

    tr:hover {
      background: #020617;
    }

    .on {
      color: #22c55e;
      font-weight: 600;
    }

    .off {
      color: #ef4444;
      font-weight: 600;
    }

    button {
      background: #334155;
      color: #e5e7eb;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    button.enable {
      background: #22c55e;
      color: #020617;
    }

    button.disable {
      background: #ef4444;
      color: #020617;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.9;
    }

    .error {
      color: #ef4444;
    }

    .success {
      color: #22c55e;
    }

    footer {
      margin-top: 40px;
      opacity: 0.5;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>Admin → Metric Catalog</header>

<div class="container">
  <h2>Metric Catalog</h2>

  <table>
    <thead>
      <tr>
        <th>Service</th>
        <th>Metric Name</th>
        <th>Interval</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="metrics"></tbody>
  </table>

  <div id="status" class="status"></div>

  <footer>
    Internal Monitoring Platform • Admin
  </footer>
</div>

<script>
function setStatus(msg, type = "") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status " + type;
}

async function loadMetrics() {
  try {
    setStatus("Loading metrics...");

    const res = await fetch("http://127.0.0.1:8000/admin/metrics");
    if (!res.ok) throw new Error("Failed to fetch metrics");

    const data = await res.json();
    const tbody = document.getElementById("metrics");
    tbody.innerHTML = "";

    data.forEach(m => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${m.service}</td>
        <td>${m.metric_name}</td>
        <td>${m.default_interval}s</td>
        <td class="${m.enabled ? 'on' : 'off'}">
          ${m.enabled ? 'ON' : 'OFF'}
        </td>
        <td>
          <button
            class="${m.enabled ? 'disable' : 'enable'}"
            onclick="toggleMetric(${m.id}, ${!m.enabled})"
          >
            ${m.enabled ? 'Disable' : 'Enable'}
          </button>
        </td>
      `;

      tbody.appendChild(row);
    });

    setStatus("Metrics loaded", "success");

  } catch (e) {
    console.error(e);
    setStatus("Error loading metrics", "error");
  }
}

async function toggleMetric(id, enabled) {
  try {
    setStatus("Updating metric...");

    const res = await fetch(
      `http://127.0.0.1:8000/admin/metrics/${id}/toggle?enabled=${enabled}`,
      { method: "PUT" }
    );

    if (!res.ok) throw new Error("Update failed");

    setStatus("Metric updated", "success");
    loadMetrics();

  } catch (e) {
    console.error(e);
    setStatus("Failed to update metric", "error");
  }
}

loadMetrics();
</script>

</body>
</html>
