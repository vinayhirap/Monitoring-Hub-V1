<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EC2 Instances</title>

  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      padding: 16px 24px;
      background: #020617;
      font-size: 18px;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
      font-size: 14px;
    }

    th {
      color: #94a3b8;
      font-weight: 500;
    }

    tr:hover {
      background: #020617;
      cursor: pointer;
    }

    .ok { color: #22c55e; font-weight: 600; }
    .warning { color: #f59e0b; font-weight: 600; }
    .critical { color: #ef4444; font-weight: 600; }
  </style>
</head>

<body>

<header>EC2 → Instances</header>

<table>
  <thead>
    <tr>
      <th>Instance ID</th>
      <th>Name</th>
      <th>CPU %</th>
      <th>Status</th>
      <th>Last Seen</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
async function loadInstances() {
  try {
    const res = await fetch("http://127.0.0.1:8000/ec2/instances");
    const data = await res.json();

    const tbody = document.getElementById("rows");
    tbody.innerHTML = "";

    data.forEach(i => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${i.instance}</td>
        <td>${i.name || "-"}</td>
        <td>${i.cpu}%</td>
        <td class="${i.status}">${i.status.toUpperCase()}</td>
        <td>${i.last_seen}</td>
      `;

      // ✅ Correct place for click handler
      tr.onclick = () => {
        window.location.href = `ec2-instance.html?id=${i.id}`;
      };

      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error(err);
    alert("EC2 backend not reachable");
  }
}

loadInstances();
</script>

</body>
</html>
