<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Monitoring Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      padding: 16px 24px;
      background: #020617;
      font-size: 18px;
      font-weight: 600;
    }

    .container { padding: 24px; }

    /* ===== Service Cards ===== */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      padding: 20px;
      border-radius: 10px;
      min-width: 180px;
      font-weight: bold;
      color: white;
    }

    .card-ok { background: #16a34a; }
    .card-warning { background: #facc15; color: #020617; }
    .card-critical { background: #dc2626; }

    /* ===== Tiles ===== */
    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .tile {
      background: #020617;
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      border-left: 6px solid #22c55e;
    }

    .tile.warning { border-left-color: #f59e0b; }
    .tile.critical { border-left-color: #ef4444; }

    .counts {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 14px;
    }

    /* ===== Tables ===== */
    h3 { margin: 30px 0 12px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #020617;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 30px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
      text-align: left;
    }

    .sev-ok { color: #22c55e; font-weight: 600; }
    .sev-warning { color: #f59e0b; font-weight: 600; }
    .sev-critical { color: #ef4444; font-weight: 600; }

    footer {
      margin-top: 40px;
      opacity: 0.5;
      font-size: 12px;
      text-align: center;
    }

    #ec2-section { display: none; }
  </style>
</head>

<body>

<header>Monitoring Hub</header>

<div class="container">

  <!-- ===== Service Health ===== -->
  <h2>Service Health</h2>
  <div class="cards">
    <div id="ec2-card" class="card">
      <h3>EC2</h3>
      <p id="ec2-status">Loading...</p>
    </div>
  </div>

  <!-- ===== Dashboard Tiles ===== -->
  <div class="tiles" id="tiles"></div>

  <!-- ===== Open Alerts ===== -->
  <h3>Open Alerts</h3>
  <table>
    <thead>
      <tr>
        <th>Instance</th>
        <th>Metric</th>
        <th>Severity</th>
        <th>Value</th>
        <th>Triggered</th>
      </tr>
    </thead>
    <tbody id="alerts"></tbody>
  </table>

  <!-- ===== EC2 Drilldown ===== -->
  <div id="ec2-section">
    <h3>EC2 Instances</h3>
    <table>
      <thead>
        <tr>
          <th>Instance</th>
          <th>Name</th>
          <th>CPU %</th>
          <th>Status</th>
          <th>Last Seen</th>
        </tr>
      </thead>
      <tbody id="ec2-table"></tbody>
    </table>
  </div>

  <footer>Internal Monitoring Platform • Proof of Concept</footer>
</div>

<script>
async function loadDashboard() {
  const res = await fetch("http://127.0.0.1:8000/dashboard/overview");
  const data = await res.json();

  /* ===== Service Card ===== */
  const ec2 = data.find(d => d.account_name);
  const card = document.getElementById("ec2-card");
  const text = document.getElementById("ec2-status");

  if (ec2.critical > 0) {
    card.className = "card card-critical";
    text.innerText = `CRITICAL: ${ec2.critical}`;
  } else if (ec2.warning > 0) {
    card.className = "card card-warning";
    text.innerText = `WARNING: ${ec2.warning}`;
  } else {
    card.className = "card card-ok";
    text.innerText = `OK: ${ec2.ok}`;
  }

  /* ===== Tiles ===== */
  const tiles = document.getElementById("tiles");
  tiles.innerHTML = "";

  data.forEach(d => {
    const tile = document.createElement("div");
    tile.className = "tile";

    if (d.critical > 0) tile.classList.add("critical");
    else if (d.warning > 0) tile.classList.add("warning");

    tile.innerHTML = `
      <h2>${d.account_name}</h2>
      <div class="counts">
        <span>OK: ${d.ok}</span>
        <span>Warning: ${d.warning}</span>
        <span>Critical: ${d.critical}</span>
      </div>
    `;

    tile.onclick = () => {
      document.getElementById("ec2-section").style.display = "block";
      loadEC2Instances();
    };

    tiles.appendChild(tile);
  });
}

async function loadAlerts() {
  const res = await fetch("http://127.0.0.1:8000/alerts/open");
  const data = await res.json();

  const tbody = document.getElementById("alerts");
  tbody.innerHTML = "";

  data.forEach(a => {
    tbody.innerHTML += `
      <tr>
        <td>${a.instance}</td>
        <td>${a.metric_name}</td>
        <td class="sev-${a.severity}">${a.severity.toUpperCase()}</td>
        <td>${a.current_value}</td>
        <td>${a.triggered_at}</td>
      </tr>
    `;
  });
}

async function loadEC2Instances() {
  const res = await fetch("http://127.0.0.1:8000/ec2/instances");
  const data = await res.json();

  const tbody = document.getElementById("ec2-table");
  tbody.innerHTML = "";

  data.forEach(i => {
    tbody.innerHTML += `
      <tr>
        <td>${i.instance}</td>
        <td>${i.name || "-"}</td>
        <td>${i.cpu}%</td>
        <td class="sev-${i.status}">${i.status.toUpperCase()}</td>
        <td>${i.last_seen || "-"}</td>
      </tr>
    `;
  });
}

/* Initial load */
loadDashboard();
loadAlerts();

/* Auto refresh */
setInterval(() => {
  loadDashboard();
  loadAlerts();
  if (document.getElementById("ec2-section").style.display === "block") {
    loadEC2Instances();
  }
}, 5000);
</script>

</body>
</html>
