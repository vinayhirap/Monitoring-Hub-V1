<!DOCTYPE html>
<html>
<head>
  <title>EC2 Instance</title>
  <style>
    body {
      margin: 0;
      font-family: Segoe UI, Arial;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      padding: 16px 24px;
      background: #020617;
      font-size: 18px;
      font-weight: 600;
    }

    .container {
      padding: 24px;
    }

    svg {
      width: 100%;
      height: 240px;
      background: #020617;
      border-radius: 8px;
    }

    .label {
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<header id="title">
  EC2 Instance
</header>

<div class="container">
  <h3>CPU Utilization (last ~2.5 mins)</h3>
  <svg id="chart"></svg>
  <div class="label">Auto-refresh every 5 seconds</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const resourceId = params.get("id");

document.getElementById("title").innerText =
  "EC2 Instance → Resource ID " + resourceId;

function drawGraph(data) {
  const svg = document.getElementById("chart");
  svg.innerHTML = "";

  const w = svg.clientWidth;
  const h = svg.clientHeight;
  const max = 100;

  const step = w / (data.length - 1);

  let points = data.map((d, i) => {
    const x = i * step;
    const y = h - (d.metric_value / max) * h;
    return `${x},${y}`;
  }).join(" ");

  const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
  polyline.setAttribute("points", points);
  polyline.setAttribute("fill", "none");
  polyline.setAttribute("stroke", "#22c55e");
  polyline.setAttribute("stroke-width", "2");

  svg.appendChild(polyline);
}

function loadMetrics() {
  fetch(`http://127.0.0.1:8000/ec2/instances/${resourceId}/metrics`)
    .then(r => r.json())
    .then(drawGraph);
}

loadMetrics();
setInterval(loadMetrics, 5000); // 🔥 5 sec refresh
</script>

</body>
</html>
